services:
  - type: web
    name: smriti-digital-legacy-bot
    runtime: docker
    plan: starter
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: BOT_DISPLAY_NAME
        value: "Smriti (स्मृति)"
      - key: BOT_USERNAME
        value: my_smriti_bot
      - key: ADMIN_TELEGRAM_ID
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_API_BASE
        value: https://api.groq.com/openai/v1
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: smriti
      - key: ENCRYPTION_KEY
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: HEARTBEAT_INTERVAL_DAYS
        value: "30"
      - key: HEARTBEAT_GRACE_DAYS
        value: "5"
      - key: JOB_CHECK_INTERVAL_HOURS
        value: "6"
      - key: TIMEZONE
        value: Asia/Kolkata
      - key: DEBUG
        value: "false"
    # PORT and RENDER_EXTERNAL_URL are injected automatically by Render.
